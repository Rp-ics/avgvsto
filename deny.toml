# AVGVSTO Server — cargo-deny configuration
# Controls license checking, dependency banning, and advisory verification.

[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
notice = "warn"
severity-threshold = "low"
ignore = []

[licenses]
unlicensed = "deny"
allow-osi-fdl = false
default = "deny"
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.exceptions]
allow = [
    { name = "ring", allow = ["MIT", "ISC", "OpenSSL"] },
    { name = "webpki", allow = ["ISC"] },
    { name = "webpki-roots", allow = ["MPL-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
